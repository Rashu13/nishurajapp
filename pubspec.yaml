publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  dio: ^5.4.0
  get_storage: ^2.1.1
  flutter_native_splash: ^2.4.6
  flutter_svg: ^2.2.0
  flutter_launcher_icons: ^0.14.4
  flutter_screenutil: ^5.9.3
